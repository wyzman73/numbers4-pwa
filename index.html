<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Numbers4 予想ツール</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F6E56">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="N4予想">
<style>
:root{
  --teal:#0F6E56; --teal-l:#1D9E75; --teal-bg:#E1F5EE;
  --amber:#BA7517; --amber-bg:#FAEEDA;
  --red:#A32D2D; --red-bg:#FCEBEB;
  --blue:#185FA5; --blue-bg:#E6F1FB;
  --tx:#2C2C2A; --tx2:#5F5E5A; --tx3:#888780;
  --bd:rgba(44,44,42,0.12);
  --bg:#F1EFE8; --sur:#fff;
  --r:14px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  color:var(--tx);background:var(--bg);
  display:flex;flex-direction:column;overflow:hidden;
}

/* ── HEADER ── */
.hdr{
  background:var(--teal);color:#fff;flex-shrink:0;
  padding:calc(env(safe-area-inset-top,0px)+12px) 16px 12px;
}
.hdr-t{font-size:18px;font-weight:700;letter-spacing:-.3px}
.hdr-s{font-size:13px;opacity:.75;margin-top:3px}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* ── NAV ── */
.nav{
  display:flex;background:var(--sur);
  border-top:.5px solid var(--bd);flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nb{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:8px 0;border:none;background:none;
  color:var(--tx3);font-size:10px;gap:3px;cursor:pointer;transition:color .15s;
}
.nb.on{color:var(--teal)}
.nb svg{width:22px;height:22px;stroke-width:1.8}

/* ── PANES ── */
.pane{display:none;padding:14px 16px 28px}
.pane.on{display:block}

/* ── CARDS ── */
.card{
  background:var(--sur);border-radius:var(--r);
  padding:14px 16px;margin-bottom:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.07);
}
.sec{
  font-size:12px;font-weight:700;color:var(--tx3);
  margin:0 0 8px;display:flex;align-items:center;gap:6px;
}
.sec+.sec{margin-top:4px}

/* ── PREDICTION CARDS ── */
.pc{
  background:var(--sur);border-radius:var(--r);margin-bottom:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden;
}
.pc-top{
  padding:10px 14px 9px;border-bottom:.5px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
}
.pc-lbl{font-size:11px;font-weight:700;color:var(--tx2)}
.pc-stars{color:#BA7517;font-size:15px;letter-spacing:1px}
.pc-body{padding:12px 14px 11px}

.pos-row{display:flex;gap:6px;margin-bottom:4px}
.pl{flex:1;text-align:center;font-size:10px;font-weight:700;color:var(--tx3)}

.digits{display:flex;gap:6px;margin-bottom:9px}
.dig{
  flex:1;height:54px;border-radius:10px;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:900;color:var(--tx);
}
.dig.hot{background:var(--teal-bg);color:var(--teal)}
.dig.warm{background:var(--amber-bg);color:var(--amber)}

.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.tag{font-size:11px;padding:2px 9px;border-radius:99px;background:var(--bg);color:var(--tx2)}
.tag.g{background:var(--teal-bg);color:var(--teal)}
.tag.b{background:var(--blue-bg);color:var(--blue)}
.tag.a{background:var(--amber-bg);color:var(--amber)}

.cp-btn{
  width:100%;padding:9px;border-radius:var(--rs);
  border:none;background:var(--bg);color:var(--tx2);
  font-size:13px;cursor:pointer;transition:background .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.cp-btn:active{background:var(--teal-bg);color:var(--teal)}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{
  background:var(--sur);border-radius:12px;
  padding:10px 6px;text-align:center;
  box-shadow:0 1px 3px rgba(0,0,0,.07);
}
.stat-v{font-size:24px;font-weight:800}
.stat-l{font-size:10px;color:var(--tx3);margin-top:2px}

/* ── HEAT MAP ── */
.hgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-bottom:14px}
.hc{
  border-radius:6px;padding:4px 2px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:40px;
}
.hc-d{font-size:12px;font-weight:700}
.hc-n{font-size:9px;opacity:.72;margin-top:1px}
.hlbl{font-size:10px;font-weight:700;color:var(--tx3);margin-bottom:5px}

/* ── BAR CHART ── */
.br{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.br-l{font-size:12px;color:var(--tx2);min-width:72px}
.br-t{flex:1;height:18px;background:var(--bg);border-radius:99px;overflow:hidden}
.br-f{height:100%;border-radius:99px;background:var(--teal);transition:width .4s}
.br-v{font-size:11px;font-weight:600;color:var(--tx2);min-width:50px;text-align:right}

/* ── HISTORY ── */
.inp-row{display:flex;gap:10px;margin-bottom:12px}
.ig{flex:1}
.ig label{font-size:11px;color:var(--tx3);display:block;margin-bottom:4px}
.ig input{
  width:100%;padding:11px 12px;
  border:1.5px solid var(--bd);border-radius:10px;
  font-size:16px;background:var(--sur);color:var(--tx);
  outline:none;-webkit-appearance:none;
}
.ig input:focus{border-color:var(--teal-l)}

.btn{
  display:block;width:100%;padding:13px 16px;
  border:none;border-radius:10px;
  font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;
}
.btn:active{opacity:.72}
.btn-p{background:var(--teal);color:#fff}
.btn-s{background:var(--bg);color:var(--tx2)}

.err{font-size:12px;color:var(--red);margin-top:6px;display:none}
.err.on{display:block}

.hr-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:.5px solid var(--bd);
}
.hr-row:last-child{border-bottom:none}
.hr-info{display:flex;gap:10px;align-items:baseline}
.hr-rnd{font-size:11px;color:var(--tx3)}
.hr-dt{font-size:11px;color:var(--tx3)}
.hr-num{font-size:20px;font-weight:800;letter-spacing:.08em;font-variant-numeric:tabular-nums}
.del{font-size:18px;color:var(--tx3);background:none;border:none;cursor:pointer;padding:6px 10px}

.warn{
  background:var(--amber-bg);border-radius:10px;
  padding:10px 14px;font-size:12px;color:var(--amber);line-height:1.65;
  margin-top:10px;
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-t">Numbers4 予想ツール</div>
  <div class="hdr-s" id="hdr-s">読み込み中...</div>
</header>

<div class="content" id="content">

  <!-- ═══ PREDICT TAB ═══ -->
  <div class="pane on" id="pane-predict">
    <div class="sec">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="15" height="15">
        <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
      </svg>
      ボックス予想（5点）
    </div>
    <div id="box-preds"></div>

    <div class="sec" style="margin-top:6px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="15" height="15">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
      </svg>
      ストレート予想（3点）
    </div>
    <div id="str-preds"></div>

    <div class="warn">
      ⚠️ 統計的傾向に基づく参考情報です。ナンバーズは完全ランダム抽選のため当選を保証するものではありません。購入は余裕資金の範囲内で楽しんでください。
    </div>
  </div>

  <!-- ═══ ANALYSIS TAB ═══ -->
  <div class="pane" id="pane-analysis">

    <div class="sec">桁別ホットマップ <span style="font-size:10px;font-weight:400;color:var(--tx3)">（緑が濃いほどホット）</span></div>
    <div class="card" id="heat-card"></div>

    <div class="sec">奇偶パターン（直近）</div>

    <div class="sec">構成タイプ（直近）</div>
    <div class="card" id="type-card"></div>
  </div>

  <!-- ═══ HISTORY TAB ═══ -->
  <div class="pane" id="pane-history">
    <div class="sec">結果を追加</div>
    <div class="card">
      <div class="inp-row">

        </div>

    <div class="card" style="padding:4px 16px" id="hist-list"></div>

    <div style="margin-top:10px">
      <button class="btn btn-s" onclick="resetData()">デフォルト（直近10回）に戻す</button>
    </div>
    <div class="warn">
      💡 最新の当選番号を追加すると予想が自動更新されます。データはこの端末に保存されます。最大20回分保持。
    </div>
  </div>

</div><!-- /content -->

<nav class="nav">
  <button class="nb on" id="nav-predict" onclick="goTab('predict')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/>
    </svg>
    予想
  </button>
  <button class="nb" id="nav-analysis" onclick="goTab('analysis')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    分析
  </button>
  <button class="nb" id="nav-history" onclick="goTab('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      <polyline points="1 4 3 6 5 4"/>

<script>
'use strict';

// ══════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════
const SKEY = 'n4pwa_v1';
const MAX  = 20;

const DEFAULTS = [
  {round:6980, date:'05/11月', num:'8852'},
  {round:6979, date:'05/08金', num:'1421'},
  {round:6978, date:'05/07木', num:'1595'},
  {round:6977, date:'05/06水', num:'5513'},
  {round:6976, date:'05/05火', num:'9998'},
  {round:6975, date:'05/04月', num:'3298'},
  {round:6974, date:'05/01金', num:'9391'},
  {round:6973, date:'04/30木', num:'8641'},
  {round:6972, date:'04/29水', num:'0799'},
  {round:6971, date:'04/28火', num:'9678'},
];

function load() {
  try { const s = localStorage.getItem(SKEY); if (s) return JSON.parse(s); } catch(e){}
  return DEFAULTS.map(r => ({...r}));
}
function save(r) {
  try { localStorage.setItem(SKEY, JSON.stringify(r)); } catch(e){}
}

// ══════════════════════════════════════════
//  ANALYSIS ENGINE
// ══════════════════════════════════════════
function analyze(results) {
  const n   = results.length;
  const pf  = [[],[],[],[]].map(() => Array(10).fill(0)); // posFreq
  const tot = Array(10).fill(0);

  results.forEach(r => {
    r.num.split('').forEach((c, i) => {
      const d = +c;
      pf[i][d]++;
      tot[d]++;
    });
  });

  const sums  = results.map(r => r.num.split('').reduce((s,c) => s + +c, 0));
  const avgSum = sums.reduce((a,b) => a+b, 0) / n;

  const rank = [...Array(10).keys()].sort((a,b) => tot[b]-tot[a]);
  const hot  = rank.slice(0, 4);
  const cold = rank.slice(7);

  // Odd/even pattern distribution
  const oe = {};
  results.forEach(r => {
    const odd = r.num.split('').filter(c => +c%2 !== 0).length;
    const k = `奇${odd}偶${4-odd}`;
    oe[k] = (oe[k]||0) + 1;
  });

  // Construction type distribution
  const types = {バラ:0, ワンペア:0, ツーペア:0, スリーカード:0, ゾロ目:0};
  results.forEach(r => {
    const u = new Set(r.num).size;
    if (u===4) types.バラ++;
    else if (u===3) types.ワンペア++;
    else if (u===2) {
      const cnt = {};
      r.num.split('').forEach(c => cnt[c]=(cnt[c]||0)+1);
      Math.max(...Object.values(cnt))===3 ? types.スリーカード++ : types.ツーペア++;
    } else types.ゾロ目++;
  });

  return {pf, tot, avgSum, sums, hot, cold, oe, types, n};
}

// ══════════════════════════════════════════
//  PREDICTION ENGINE
// ══════════════════════════════════════════
function scoreBox(digs, an, rBoxSets) {
  const {tot, avgSum, cold} = an;
  let s = 0;
  const sum  = digs.reduce((a,b) => a+b, 0);
  const odd  = digs.filter(d => d%2!==0).length;
  const uniq = new Set(digs).size;
  const key  = [...digs].sort((a,b)=>a-b).join('');

  // Sum proximity to historical average (max +6)
  s += Math.max(0, 6 - Math.abs(sum - Math.round(avgSum)));

  // Odd/even balance score
  if (odd===2) s+=4; else if (odd===3) s+=3; else if (odd===1) s+=2; else s+=1;

  // Uniqueness (bara most common statistically)
  if (uniq===4) s+=4; else if (uniq===3) s+=2;

  // Hot-digit frequency contribution
  digs.forEach(d => s += tot[d] * 0.35);

  // Cold-digit penalty
  digs.forEach(d => { if (cold.includes(d)) s -= 1.5; });

  // Not in last 5 results
  if (!rBoxSets.has(key)) s += 3;

  // Avoid 0 (coldest digit in last 10)
  if (digs.includes(0)) s -= 2;

  // Extreme-sum penalty
  if (sum < 10 || sum > 30) s -= 3;

  return s;
}

function genBox(an, results) {
  const {tot} = an;
  const rBoxSets = new Set(
    results.slice(0,5).map(r => [...r.num].map(Number).sort((a,b)=>a-b).join(''))
  );

  const rankAll = [...Array(10).keys()].sort((a,b) => tot[b]-tot[a]);
  const top8 = rankAll.slice(0,8);
  const top7 = rankAll.slice(0,7);
  const cands = [];

  // Bara (all-different) from top 8
  for (let a=0;a<top8.length;a++)
  for (let b=a+1;b<top8.length;b++)
  for (let c=b+1;c<top8.length;c++)
  for (let d=c+1;d<top8.length;d++) {
    const digs = [top8[a],top8[b],top8[c],top8[d]];
    cands.push({digs, s:scoreBox(digs,an,rBoxSets), type:'bara'});
  }

  // One-pair from top 7
  for (let p=0;p<top7.length;p++)
  for (let a=0;a<top7.length;a++) { if(a===p) continue;
  for (let b=a+1;b<top7.length;b++) { if(b===p) continue;
    const digs = [top7[p],top7[p],top7[a],top7[b]];
    cands.push({digs, s:scoreBox(digs,an,rBoxSets), type:'pair'});
  }}

  cands.sort((a,b) => b.s-a.s);
  const seen = new Set();
  const top = [];
  for (const c of cands) {
    const k = [...c.digs].sort((a,b)=>a-b).join('');
    if (!seen.has(k)) { seen.add(k); top.push(c); if(top.length>=5) break; }
  }

  const labels = ['★★★','★★','★★','★','★'];
  return top.map((c,i) => {
    const digs = [...c.digs].sort((a,b)=>a-b);
    const sum  = digs.reduce((a,b)=>a+b,0);
    const odd  = digs.filter(d=>d%2!==0).length;
    const uniq = new Set(digs).size;
    return {digs, sum, odd, uniq, stars:labels[i], type:c.type};
  });
}

function genStr(an, results) {
  const {pf, avgSum} = an;

  // Rank digits per position
  const pRank = pf.map(f => [...Array(10).keys()].sort((a,b)=>f[b]-f[a]));

  const rNums = new Set(results.slice(0,5).map(r=>r.num));

  function make(choices) { return choices.map((c,i) => pRank[i][c]); }

  function score(digs) {
    let s = 0;
    const sum = digs.reduce((a,b)=>a+b,0);
    const odd = digs.filter(d=>d%2!==0).length;
    digs.forEach((d,i) => s += pf[i][d] * 2);
    s += Math.max(0, 6 - Math.abs(sum - Math.round(avgSum)));
    if (odd===2) s+=3; else if (odd===3) s+=2;
    if (!rNums.has(digs.join(''))) s+=2;
    return s;
  }

  const cands = [];
  for(let a=0;a<3;a++) for(let b=0;b<3;b++) for(let c=0;c<3;c++) for(let d=0;d<3;d++) {
    const digs = make([a,b,c,d]);
    cands.push({digs, s:score(digs)});
  }
  cands.sort((a,b)=>b.s-a.s);

  const seen = new Set(); const top = [];
  for (const c of cands) {
    const k = c.digs.join('');
    if (!seen.has(k)) { seen.add(k); top.push(c); if(top.length>=3) break; }
  }

  return top.map((c,i) => ({
    digs:c.digs,
    sum:c.digs.reduce((a,b)=>a+b,0),
    odd:c.digs.filter(d=>d%2!==0).length,
    stars:['★★★','★★','★'][i],
  }));
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function heatSt(n, max) {
  if (!n || !max) return {bg:'#F1EFE8',fg:'#888780'};
  const t = n/max;
  const bgs=['#E1F5EE','#9FE1CB','#5DCAA5','#1D9E75','#0F6E56'];
  const fgs=['#085041','#085041','#04342C','#E1F5EE','#E1F5EE'];
  const i = Math.min(Math.floor(t*bgs.length), bgs.length-1);
  return {bg:bgs[i], fg:fgs[i]};
}

function digCls(d, an) {
  return an.hot.includes(d) ? 'hot' : '';
}

// Per-position hotness for straight predictions
function digClsPos(d, posIdx, an) {
  const freq = an.pf[posIdx];
  const maxF = Math.max(...freq);
  return (freq[d] >= maxF * 0.6 && freq[d] > 0) ? 'hot' : '';
}

function cpBtn(numStr, display) {
  return `<button class="cp-btn" onclick="copyNum('${numStr}',this)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
    </svg>
    ${display}
  </button>`;
}

function renderPreds(box, str, an) {
  // Box
  document.getElementById('box-preds').innerHTML = box.map((p,i) => {
    const lbl   = i===0 ? 'ボックス 本命' : `ボックス 候補${i+1}`;
    const oeL   = `奇${p.odd}偶${4-p.odd}`;
    const typeL = p.uniq===4 ? 'バラ' : 'ワンペア';
    const dh    = p.digs.map(d=>`<div class="dig ${digCls(d,an)}">${d}</div>`).join('');
    const numStr = p.digs.join('');
    return `
    <div class="pc">
      <div class="pc-top"><span class="pc-lbl">${lbl}</span><span class="pc-stars">${p.stars}</span></div>
      <div class="pc-body">
        <div class="digits">${dh}</div>
        <div class="tags">
          <span class="tag g">和 ${p.sum}</span>
          <span class="tag">${oeL}</span>
          <span class="tag">${typeL}</span>
        </div>
        ${cpBtn(numStr, `コピー &nbsp;${p.digs.join(' - ')}`)}
      </div>
    </div>`;
  }).join('');

  // Straight
  const posN = ['千','百','十','一'];
  document.getElementById('str-preds').innerHTML = str.map((p,i) => {
    const lbl = i===0 ? 'ストレート 本命' : `ストレート 候補${i+1}`;
    const oeL = `奇${p.odd}偶${4-p.odd}`;
    const plH = posN.map(n=>`<div class="pl">${n}</div>`).join('');
    const dh  = p.digs.map((d,pi)=>`<div class="dig ${digClsPos(d,pi,an)}">${d}</div>`).join('');
    const numStr = p.digs.join('');
    return `
    <div class="pc">
      <div class="pc-top"><span class="pc-lbl">${lbl}</span><span class="pc-stars">${p.stars}</span></div>
      <div class="pc-body">
        <div class="pos-row">${plH}</div>
        <div class="digits">${dh}</div>
        <div class="tags">
          <span class="tag g">和 ${p.sum}</span>
          <span class="tag">${oeL}</span>
          <span class="tag b">順番固定</span>
        </div>
        ${cpBtn(numStr, `コピー &nbsp;${p.digs.join(' ')}（千百十一）`)}
      </div>
    </div>`;
  }).join('');
}

function renderAnalysis(an) {
  const {tot, avgSum, pf, oe, types, n, hot, cold} = an;

  // Stats row
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-v" style="color:var(--teal)">${avgSum.toFixed(1)}</div><div class="stat-l">直近平均和</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--amber)">${hot[0]}</div><div class="stat-l">最ホット</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--red)">${cold[cold.length-1]}</div><div class="stat-l">最コールド</div></div>
  `;

  // Heat maps
  const posNm = ['千の位','百の位','十の位','一の位'];
  let h = '';

  const maxT = Math.max(...tot, 1);
  h += `<p class="hlbl">全桁合計（${n*4}桁中）</p><div class="hgrid" style="margin-bottom:16px">`;
  for(let d=0;d<10;d++) {
    const st = heatSt(tot[d], maxT);
    h += `<div class="hc" style="background:${st.bg};color:${st.fg}"><span class="hc-d">${d}</span><span class="hc-n">${tot[d]}</span></div>`;
  }
  h += '</div>';

  pf.forEach((freq, pi) => {
    const mf = Math.max(...freq, 1);
    h += `<p class="hlbl">${posNm[pi]}</p><div class="hgrid" style="margin-bottom:${pi<3?16:0}px">`;
    for(let d=0;d<10;d++) {
      const st = heatSt(freq[d], mf);
      h += `<div class="hc" style="background:${st.bg};color:${st.fg}"><span class="hc-d">${d}</span><span class="hc-n">${freq[d]}</span></div>`;
    }
    h += '</div>';
  });
  document.getElementById('heat-card').innerHTML = h;

  // Odd/even bars
  const oeOrd = ['奇4偶0','奇3偶1','奇2偶2','奇1偶3','奇0偶4'];
  document.getElementById('oe-card').innerHTML = oeOrd.map(k => {
    const cnt = oe[k]||0;
    const pct = Math.round(cnt/n*100);
    return `<div class="br"><span class="br-l">${k}</span><div class="br-t"><div class="br-f" style="width:${pct}%"></div></div><span class="br-v">${cnt}回 ${pct}%</span></div>`;
  }).join('');

  // Type bars
  const tyOrd = ['バラ','ワンペア','ツーペア','スリーカード','ゾロ目'];
  document.getElementById('type-card').innerHTML = tyOrd.map(k => {
    const cnt = types[k]||0;
    const pct = Math.round(cnt/n*100);
    return `<div class="br"><span class="br-l">${k}</span><div class="br-t"><div class="br-f" style="width:${pct}%"></div></div><span class="br-v">${cnt}回 ${pct}%</span></div>`;
  }).join('');
}

function renderHistory(results) {
  document.getElementById('data-cnt').textContent = results.length;
  document.getElementById('hist-list').innerHTML = results.map((r,i) => `
    <div class="hr-row">
      <div class="hr-info">
        <span class="hr-rnd">第${r.round}回</span>
        <span class="hr-dt">${r.date}</span>
        <span class="hr-num">${r.num}</span>
      </div>
      <button class="del" onclick="delResult(${i})">✕</button>
    </div>`).join('');
}

// ══════════════════════════════════════════
//  APP STATE
// ══════════════════════════════════════════
let results = load();

function refresh() {
  results.sort((a,b) => b.round - a.round);
  if (results.length > MAX) results = results.slice(0, MAX);
  save(results);

  const an = analyze(results);
  const nextRound = results[0] ? results[0].round + 1 : '—';
  document.getElementById('hdr-s').textContent = `第${nextRound}回を予想中 ｜ 直近${results.length}回分析`;

  renderPreds(genBox(an, results), genStr(an, results), an);
  renderAnalysis(an);
  renderHistory(results);
}

// ══════════════════════════════════════════
//  USER ACTIONS
// ══════════════════════════════════════════
function goTab(t) {
  document.querySelectorAll('.pane').forEach(el => el.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(el => el.classList.remove('on'));
  document.getElementById('pane-'+t).classList.add('on');
  document.getElementById('nav-'+t).classList.add('on');
  document.getElementById('content').scrollTop = 0;
}

function addResult() {
  const rEl  = document.getElementById('inp-r');
  const nEl  = document.getElementById('inp-n');
  const errEl= document.getElementById('inp-err');
  errEl.classList.remove('on');

  const round = parseInt(rEl.value);
  const num   = nEl.value.trim();

  if (isNaN(round) || round < 1) {
    errEl.textContent='回号を正しく入力してください'; errEl.classList.add('on'); return;
  }
  if (!/^\d{4}$/.test(num)) {
    errEl.textContent='当選番号は4桁の数字で入力してください'; errEl.classList.add('on'); return;
  }
  if (results.some(r => r.round === round)) {
    errEl.textContent=`第${round}回はすでに登録済みです`; errEl.classList.add('on'); return;
  }

  const now = new Date();
  const dateStr = `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}追加`;
  results.unshift({round, date:dateStr, num});
  rEl.value=''; nEl.value='';
  refresh();

  const btn = document.getElementById('add-btn');
  btn.textContent='✓ 追加しました！';
  setTimeout(() => btn.textContent='追加して予想を更新', 1500);
}

function delResult(i) {
  if (results.length <= 3) { alert('最低3件のデータが必要です'); return; }
  if (confirm(`第${results[i].round}回（${results[i].num}）を削除しますか？`)) {
    results.splice(i, 1);
    refresh();
  }
}

function resetData() {
  if (confirm('デフォルトデータ（直近10回）に戻しますか？\n追加したデータは削除されます。')) {
    results = DEFAULTS.map(r => ({...r}));
    refresh();
  }
}

function copyNum(num, btn) {
  const orig = btn.innerHTML;
  function done(ok) {
    btn.textContent = ok ? '✓ コピーしました！' : `${num}（手動でコピーしてください）`;
    setTimeout(() => btn.innerHTML=orig, 1800);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(num).then(() => done(true)).catch(() => fallback(num, btn, orig));
  } else {
    fallback(num, btn, orig);
  }
}
function fallback(num, btn, orig) {
  const ta = document.createElement('textarea');
  ta.value = num;
  ta.style.cssText='position:fixed;top:0;left:0;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  btn.textContent = ok ? '✓ コピーしました！' : `${num}（コピー失敗 – 手動でどうぞ）`;
  setTimeout(() => btn.innerHTML=orig, 1800);
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
refresh();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
