name: Numbers4 当選番号自動収集

on:
  schedule:
    # 月〜金 19:15 JST (= 10:15 UTC)
    - cron: "15 10 * * 1-5"
    # 毎週日曜 09:00 JST (= 00:00 UTC) 週次フルスキャン
    - cron: "0 0 * * 0"

  # ★ 手動実行ボタン（初回テスト・デバッグ用）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 当選番号を収集
        run: |
          echo "=== fetch_result.py 実行 ==="
          python fetch_result.py
          echo "=== 実行完了 ==="

      - name: data.json の内容を確認（デバッグ用）
        run: |
          echo "--- data.json の先頭 ---"
          head -20 data.json || echo "(ファイルなし)"

      - name: 変更をコミット＆プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git diff --stat data.json

          if git diff --quiet data.json; then
            echo "data.json に変更なし。コミットをスキップ。"
          else
            COUNT=$(python3 -c "
import json, sys
try:
  d = json.load(open('data.json'))
  print(d.get('count', len(d.get('results', []))))
except:
  print('?')
")
            LATEST=$(python3 -c "
import json, sys
try:
  d = json.load(open('data.json'))
  print(d.get('latest', d['results'][0]['round']))
except:
  print('?')
")
            git add data.json
            git commit -m "🎯 N4自動更新: 第${LATEST}回まで ${COUNT}件 ($(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')JST)"
            git push
            echo "✅ プッシュ完了"
          fi
